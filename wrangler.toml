name = "websam"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
	{ pattern = "websam.xevion.dev", custom_domain = true }
]

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[[r2_buckets]]
binding = "MODELS"
bucket_name = "websam"
